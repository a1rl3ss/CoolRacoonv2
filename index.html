<!DOCTYPE html>
<html>
<head>
    <title>Raccoon AI: One Model</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #webcam { transform: rotateY(180deg); width: 280px; border-radius: 12px; border: 2px solid #555; }
        #raccoon_view { width: 350px; height: 350px; object-fit: contain; margin-top: 10px; }
        #status { margin-top: 10px; font-weight: bold; color: #0f0; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <img id="raccoon_view" src="normal.png">
        <div id="status">Загрузка нейросети...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const raccoonImg = document.getElementById('raccoon_view');
        const status = document.getElementById('status');
        let currentEmo = "normal.png";

        // Используем ТОЛЬКО Pose (она видит и нос, и руки)
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        
        // modelComplexity: 0 - это самая быстрая модель для мобилок и iPad
        pose.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        pose.onResults((results) => {
            if (!results.poseLandmarks) return;

            const p = results.poseLandmarks;
            const nose = p[0], l_ear = p[7], r_ear = p[8];
            const l_wrist = p[15], r_wrist = p[16];
            const l_sh = p[11], r_sh = p[12];

            let emotion = "normal.png";

            // СТРОГАЯ ПРОВЕРКА ВИДИМОСТИ (чтобы не было случайных срабатываний)
            const handsInFrame = l_wrist.visibility > 0.6 || r_wrist.visibility > 0.6;

            // 1. ПОВОРОТ ГОЛОВЫ (pls) - твои 0.4
            if (Math.abs(nose.x - l_ear.x) < Math.abs(nose.x - r_ear.x) * 0.4) {
                emotion = "pls.png";
            }
            // 2. РУКИ ВЫШЕ НОСА (beg / cinema) - твои 0.1 и 0.15
            else if (handsInFrame && l_wrist.y < nose.y - 0.1 && r_wrist.y < nose.y - 0.1) {
                emotion = Math.abs(l_wrist.x - r_wrist.x) < 0.15 ? "beg.png" : "cinema.png";
            }
            // 3. HARD (Рука у лица) - твой 0.2
            else if (l_wrist.visibility > 0.6 && l_wrist.y < nose.y && Math.abs(l_wrist.x - nose.x) < 0.2) {
                emotion = "hard.png";
            }
            // 4. ПУШКА (Z-глубина) - твой -0.7
            else if ((l_wrist.visibility > 0.7 && l_wrist.z < l_sh.z - 0.7) || 
                     (r_wrist.visibility > 0.7 && r_wrist.z < r_sh.z - 0.7)) {
                emotion = "gun.png";
            }

            updateImg(emotion);
        });

        function updateImg(name) {
            if (currentEmo !== name) {
                currentEmo = name;
                raccoonImg.src = name;
                status.innerText = "Эмоция: " + name.replace(".png", "");
            }
        }

        const camera = new Camera(video, {
            onFrame: async () => { await pose.send({image: video}); },
            width: 640, height: 480
        });
        camera.start().then(() => status.innerText = "Система ГОТОВА ✅");
    </script>
</body>
</html>
