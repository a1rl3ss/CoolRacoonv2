<!DOCTYPE html>
<html>
<head>
    <title>Raccoon AI: Final Logic</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #webcam { transform: rotateY(180deg); width: 320px; border-radius: 10px; border: 2px solid #444; }
        #raccoon_view { width: 350px; height: 350px; object-fit: contain; margin-top: 10px; }
        #log { background: #000; color: #0f0; padding: 8px; width: 320px; font-family: monospace; font-size: 11px; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="main">
        <video id="webcam" autoplay playsinline></video>
        <img id="raccoon_view" src="normal.png">
        <div id="log">Статус: Жду камеру...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const raccoonImg = document.getElementById('raccoon_view');
        const log = document.getElementById('log');
        let currentEmotion = "normal.png";

        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.6 });

        let poseActive = false;

        pose.onResults((results) => {
            if (results.poseLandmarks) {
                const p = results.poseLandmarks;
                const nose = p[0], l_ear = p[7], r_ear = p[8];
                const l_wrist = p[15], r_wrist = p[16];
                const l_sh = p[11], r_sh = p[12];

                let emo = "normal.png";

                // ОЧЕНЬ СТРОГАЯ ПРОВЕРКА ВИДИМОСТИ (0.8)
                const leftVisible = l_wrist.visibility > 0.8;
                const rightVisible = r_wrist.visibility > 0.8;

                // 1. Поворот головы (pls)
                if (Math.abs(nose.x - l_ear.x) < Math.abs(nose.x - r_ear.x) * 0.4) {
                    emo = "pls.png";
                }
                // 2. Руки высоко (beg / cinema)
                else if (leftVisible && rightVisible && l_wrist.y < nose.y - 0.1 && r_wrist.y < nose.y - 0.1) {
                    emo = Math.abs(l_wrist.x - r_wrist.x) < 0.18 ? "beg.png" : "cinema.png";
                }
                // 3. HARD (Рука у лица) - ТЕПЕРЬ ВАЖНЕЕ ПУШКИ
                else if (leftVisible && l_wrist.y < nose.y && Math.abs(l_wrist.x - nose.x) < 0.25) {
                    emo = "hard.png";
                }
                // 4. ПУШКА (Z-глубина) - срабатывает только если рука РЕАЛЬНО впереди
                else if ((leftVisible && l_wrist.z < l_sh.z - 0.8) || (rightVisible && r_wrist.z < r_sh.z - 0.8)) {
                    emo = "gun.png";
                }

                if (emo !== "normal.png") {
                    update(emo);
                    poseActive = true;
                    log.innerText = `POSE: ${emo}`;
                } else {
                    poseActive = false;
                    update("normal.png"); // Сброс, если ничего не найдено
                }
            } else {
                poseActive = false;
            }
        });

        faceMesh.onResults((results) => {
            if (poseActive) return;

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const f = results.multiFaceLandmarks[0];
                const mouth = Math.abs(f[13].y - f[14].y);
                
                if (mouth >= 0.045) update("shock.png");
                else if (mouth > 0.018) update("cool.png");
                else update("normal.png");
                
                log.innerText = `FACE: Mouth ${mouth.toFixed(3)}`;
            }
        });

        function update(name) {
            if (currentEmotion !== name) {
                currentEmotion = name;
                raccoonImg.src = name;
            }
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({image: video});
                await faceMesh.send({image: video});
            },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
