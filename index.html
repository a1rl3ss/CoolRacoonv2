<!DOCTYPE html>
<html>
<head>
    <title>Raccoon AI: Speed Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #webcam { transform: rotateY(180deg); width: 280px; border-radius: 10px; border: 2px solid #555; }
        #raccoon_view { width: 350px; height: 350px; object-fit: contain; margin-top: 10px; }
        #status { font-size: 1.2em; color: #0f0; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <img id="raccoon_view" src="normal.png">
        <div id="status">Загрузка системы...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const raccoonImg = document.getElementById('raccoon_view');
        const status = document.getElementById('status');
        let currentEmotion = "normal.png";

        // Оставляем только Pose и FaceMesh (Hands убираем, Pose и так видит руки)
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.5 });

        pose.onResults((results) => {
            if (!results.poseLandmarks) return;
            
            const p = results.poseLandmarks;
            const nose = p[0], l_ear = p[7], r_ear = p[8];
            const l_wrist = p[15], r_wrist = p[16];
            const l_sh = p[11], r_sh = p[12];

            let emo = "normal.png";

            // 1. ПОВОРОТ ГОЛОВЫ (pls) - Сделал еще чувствительнее (0.7)
            const distL = Math.abs(nose.x - l_ear.x);
            const distR = Math.abs(nose.x - r_ear.x);
            if (distL < distR * 0.5 || distR < distL * 0.5) {
                emo = "pls.png";
            }
            // 2. РУКИ ВЫШЕ НОСА (beg / cinema)
            else if (l_wrist.y < nose.y - 0.05 && r_wrist.y < nose.y - 0.05) {
                emo = Math.abs(l_wrist.x - r_wrist.x) < 0.2 ? "beg.png" : "cinema.png";
            }
            // 3. ПУШКА (Если видна хотя бы одна рука выше плеча или вытянута)
            else if (l_wrist.visibility > 0.5 && (l_wrist.y < l_sh.y || Math.abs(l_wrist.z) > 0.5)) {
                emo = "gun.png";
            }
            // 4. HARD (Рука у носа)
            else if (l_wrist.y < nose.y && Math.abs(l_wrist.x - nose.x) < 0.2) {
                emo = "hard.png";
            }

            if (emo !== "normal.png") {
                update(emo);
            } else {
                // Если Pose не нашел жестов, FaceMesh обновит на cool/shock/normal
            }
        });

        faceMesh.onResults((results) => {
            // Если Pose уже нашел жест (не normal), рот не проверяем
            if (currentEmotion !== "normal.png" && currentEmotion !== "cool.png" && currentEmotion !== "shock.png") return;

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const f = results.multiFaceLandmarks[0];
                const mouth = Math.abs(f[13].y - f[14].y);
                if (mouth >= 0.045) update("shock.png");
                else if (mouth > 0.018) update("cool.png");
                else update("normal.png");
            }
        });

        function update(name) {
            if (currentEmotion !== name) {
                currentEmotion = name;
                raccoonImg.src = name;
                status.innerText = "Вижу: " + name.replace(".png", "");
            }
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({image: video});
                await faceMesh.send({image: video});
            },
            width: 640, height: 480
        });
        camera.start().then(() => status.innerText = "Система активна ✅");
    </script>
</body>
</html>
