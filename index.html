<!DOCTYPE html>
<html>
<head>
    <title>Raccoon AI: Exact Logic</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #webcam { transform: rotateY(180deg); width: 320px; border-radius: 10px; border: 2px solid #555; }
        #raccoon_view { width: 350px; height: 350px; object-fit: contain; margin-top: 15px; }
        .status { margin-top: 10px; font-size: 1.1em; color: #0f0; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <img id="raccoon_view" src="normal.png">
        <div id="status" class="status">Настройка системы...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const raccoonImg = document.getElementById('raccoon_view');
        const status = document.getElementById('status');

        let currentEmotion = "normal.png";

        // 1. ПОДКЛЮЧАЕМ ПОЗУ (для жестов beg, cinema, gun, pls, hard)
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        // 2. ПОДКЛЮЧАЕМ ЛИЦО (для cool, shock)
        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

        // ЛОГИКА ЖЕСТОВ (КОПИЯ ТВОЕГО PYTHON КОДА)
        pose.onResults((results) => {
            if (results.poseLandmarks) {
                const p = results.poseLandmarks;
                const nose = p[0], l_ear = p[7], r_ear = p[8];
                const l_wrist = p[15], r_wrist = p[16];
                const l_shoulder = p[11], r_shoulder = p[12];

                let detected = "normal.png";

                // ТВОИ УСЛОВИЯ:
                // 1. Поворот головы (pls)
                if (Math.abs(nose.x - l_ear.x) < Math.abs(nose.x - r_ear.x) * 0.4) {
                    detected = "pls.png";
                }
                // 2. Руки выше носа (beg / cinema)
                else if (l_wrist.y < nose.y - 0.1 && r_wrist.y < nose.y - 0.1) {
                    detected = Math.abs(l_wrist.x - r_wrist.x) < 0.15 ? "beg.png" : "cinema.png";
                }
                // 3. Пистолет (проверка по Z)
                else if (l_wrist.z < l_shoulder.z - 0.1 || r_wrist.z < r_shoulder.z - 0.1) {
                    detected = "gun.png";
                }
                // 4. Рука у лица (hard)
                else if (l_wrist.y < nose.y && Math.abs(l_wrist.x - nose.x) < 0.2) {
                    detected = "hard.png";
                }

                if (detected !== "normal.png") {
                    updateImg(detected);
                    return; // Если нашли жест, лицо не проверяем
                }
            }
            // Если жестов нет, переходим к лицу
            faceActive = true;
        });

        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const f = results.multiFaceLandmarks[0];
                const mouthOpen = Math.abs(f[13].y - f[14].y);
                
                // ТВОИ УСЛОВИЯ ДЛЯ ЛИЦА:
                if (mouthOpen >= 0.045) updateImg("shock.png");
                else if (mouthOpen > 0.018) updateImg("cool.png");
                else updateImg("normal.png");
            }
        });

        function updateImg(name) {
            if (currentEmotion !== name) {
                currentEmotion = name;
                raccoonImg.src = name;
                status.innerText = "Эмоция: " + name.replace(".png", "");
            }
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({image: video});
                await faceMesh.send({image: video});
            },
            width: 640, height: 480
        });
        camera.start().then(() => status.innerText = "Система активна ✅");
    </script>
</body>
</html>
