<!DOCTYPE html>
<html>
<head>
    <title>Raccoon AI: Simple & Fast</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #webcam { transform: rotateY(180deg); width: 320px; border-radius: 10px; border: 2px solid #555; }
        #raccoon_view { width: 350px; height: 350px; object-fit: contain; margin-top: 15px; }
        .status { margin-top: 10px; font-size: 1.2em; color: #0f0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <img id="raccoon_view" src="normal.png">
        <div id="status" class="status">Загрузка...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const raccoonImg = document.getElementById('raccoon_view');
        const status = document.getElementById('status');

        let currentEmotion = "normal.png";

        // 1. Настройка нейросетей
        const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, minDetectionConfidence: 0.5 });

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.5 });

        // Флаг, чтобы лицо не перебивало жесты рук
        let gestureActive = false;

        // ЛОГИКА ТЕЛА (Поворот головы -> pls)
        pose.onResults((results) => {
            if (results.poseLandmarks) {
                const p = results.poseLandmarks;
                const nose = p[0], l_ear = p[7], r_ear = p[8];

                // ПОВОРОТ ГОЛОВЫ (условие стало мягче: 0.6 вместо 0.4)
                const distL = Math.abs(nose.x - l_ear.x);
                const distR = Math.abs(nose.x - r_ear.x);
                
                if (distL < distR * 0.6 || distR < distL * 0.6) {
                    updateImg("pls.png");
                    gestureActive = true;
                } else {
                    gestureActive = false;
                }
            }
        });

        // ЛОГИКА РУК (1 рука -> gun, 2 руки -> beg/cinema)
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                gestureActive = true;
                
                if (results.multiHandLandmarks.length === 1) {
                    // ВИДИМ 1 РУКУ -> ПУШКА
                    updateImg("gun.png");
                } 
                else if (results.multiHandLandmarks.length === 2) {
                    // ВИДИМ 2 РУКИ -> BEG или CINEMA
                    const h1 = results.multiHandLandmarks[0][0];
                    const h2 = results.multiHandLandmarks[1][0];
                    const dist = Math.abs(h1.x - h2.x);
                    
                    if (dist < 0.2) updateImg("beg.png");
                    else updateImg("cinema.png");
                }
            } else if (!gestureActive) {
                // Если рук нет и голова прямо - будет normal (обновится в FaceMesh)
            }
        });

        // ЛОГИКА ЛИЦА (Shock, Cool)
        faceMesh.onResults((results) => {
            if (!gestureActive && results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const f = results.multiFaceLandmarks[0];
                const mouthOpen = Math.abs(f[13].y - f[14].y);
                
                if (mouthOpen >= 0.045) updateImg("shock.png");
                else if (mouthOpen > 0.018) updateImg("cool.png");
                else updateImg("normal.png");
            }
        });

        function updateImg(name) {
            if (currentEmotion !== name) {
                currentEmotion = name;
                raccoonImg.src = name;
                status.innerText = "Эмоция: " + name.replace(".png", "");
            }
        }

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({image: video});
                await hands.send({image: video});
                await faceMesh.send({image: video});
            },
            width: 640, height: 480
        });
        camera.start().then(() => status.innerText = "Система активна ✅");
    </script>
</body>
</html>
